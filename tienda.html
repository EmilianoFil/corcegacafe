<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tienda Online Córcega Café - Especialidad y Pastelería">
    <title>Córcega Café - Tienda</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/tienda/tienda.css?v=1.4">
</head>
<body>

    <div class="top-bar">
        <!-- Header -->
        <header id="main-header"></header>

        <!-- Categories -->
        <div class="categories-container" id="categories-nav">
            <!-- Dinámico -->
        </div>
    </div>

    <!-- Product Display -->
    <main class="products-grid" id="products-container">
        <!-- Products will be injected here by JS -->
        <div class="corcega-loader-container">
            <div class="corcega-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <p class="corcega-loader-text">Cargando productos...</p>
        </div>
    </main>

    <!-- Floating Cart Button -->
    <button class="cart-floating" id="btn-open-cart">
        <i class="fas fa-shopping-bag"></i>
        <div class="cart-count" id="cart-badge">0</div>
    </button>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Mi Carrito</h2>
            <button class="btn-close-cart" id="btn-close-cart"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="cart-items" id="cart-items-list">
            <!-- Items injected by JS -->
            <!-- Empty State Placeholder -->
            <div class="cart-empty">
                <i class="fas fa-shopping-basket"></i>
                <p>Tu carrito está vacío</p>
                <button class="btn-checkout" style="background: var(--panel-oscuro); margin-top: 10px;" id="btn-start-shopping">Ver productos</button>
            </div>
        </div>

        <div class="cart-footer">
            <div class="total-row">
                <span class="total-label">Total estimado</span>
                <span class="total-amount" id="cart-total">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-go-to-checkout">CONTINUAR COMPRA</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/tienda/header-component.js?v=1.0"></script>
    <script type="module" src="js/tienda/tienda.js?v=1.6"></script>
    
    <!-- Modal Checkout -->
    <div class="modal-overlay" id="checkout-modal" style="display: none;">
        <div class="modal-checkout">
            <h2 style="font-family: var(--font-display); color: var(--panel-oscuro);">¡Casi listo! ☕</h2>
            <p>Iniciá sesión para sumar cafecitos y ver tu historial, o continuá como invitado.</p>
            
            <div class="modal-actions">
                <button class="btn-modal btn-modal-primary" id="modal-btn-login">
                    INICIAR SESIÓN
                </button>
                <button class="btn-modal btn-modal-accent" id="modal-btn-register">
                    CREAR CUENTA
                </button>
                <button class="btn-modal btn-modal-outline" id="modal-btn-guest">
                    CONTINUAR COMO INVITADO
                </button>
            </div>
            
            <button onclick="document.getElementById('checkout-modal').style.display='none'" 
                style="margin-top: 20px; background: none; border: none; font-size: 12px; font-weight: 600; color: #999; cursor: pointer;">
                VOLVER AL CARRITO
            </button>
        </div>
    </div>

    <!-- Modal: Detalle de Producto -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <button class="btn-close-modal" id="btn-close-product-modal"><i class="fas fa-times"></i></button>
        <div class="modal-content product-detail-modal">
            <div class="product-detail-grid">
                <!-- Carrusel del Detalle -->
                <div class="product-detail-media">
                    <div class="detail-carousel-container" id="detail-carousel-inner">
                        <!-- Imágenes dinámicas -->
                    </div>
                    <button class="carousel-nav prev" onclick="window.moveDetailCarousel(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="carousel-nav next" onclick="window.moveDetailCarousel(1)"><i class="fas fa-chevron-right"></i></button>
                    <div class="carousel-dots" id="detail-carousel-dots"></div>
                </div>

                <div class="product-detail-info">
                    <span id="detail-category" class="category-pill">Categoría</span>
                    <h2 id="detail-name">Nombre del Producto</h2>
                    <p id="detail-description" class="long-description">
                        Cargando descripción...
                    </p>
                    <div class="detail-price-row">
                        <span id="detail-price" class="price-tag">$0.00</span>
                        <div class="detail-add-controls">
                            <div class="qty-selector">
                                <button onclick="window.adjustDetailQty(-1)"><i class="fas fa-minus"></i></button>
                                <span id="detail-qty">1</span>
                                <button onclick="window.adjustDetailQty(1)"><i class="fas fa-plus"></i></button>
                            </div>
                            <button class="btn-primary-corcega" id="btn-modal-add-to-cart">
                                AGREGAR AL CARRITO
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
