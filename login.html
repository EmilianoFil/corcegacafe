<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <title>Admin - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Syncopate&display=swap" rel="stylesheet"> <!-- Tipografías personalizadas --> <!--//Agrego para uso de letra -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXMC00DZ81"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NXMC00DZ81');
  </script>
</head>
<body>
  <div class="menu-style">
    <h1>Acceso Admin</h1>
    <form id="loginForm">
      <div style="margin-bottom: 10px;">
        <input type="text" id="usuario" placeholder="Usuario" required />
      </div>
      <div style="margin-bottom: 10px;">
        <input type="password" id="clave" placeholder="Contraseña" required />
      </div>
      <button type="submit" class="btn-primary">Ingresar</button>
      <div style="margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px;">
        <button type="button" id="btnGoogle" class="btn-primary" style="background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
          Entrar con Google
        </button>
      </div>
    </form>
  <div id="loader" style="display: none; margin-top: 20px; text-align: center; width: 100%;">
    <img src="css/img/Corcega_Logo_Naranja.png" class="galope" style="width: 95px; display: inline-block;">
  </div>
    <div class="mensaje error" id="errorMsg" style="display:none;">Usuario o clave incorrecta</div>
    <div class="mensaje error" id="noAdminMsg" style="display:none;">No tienes permisos de administrador</div>
  </div>

  <script type="module">
    import { app, db } from './js/firebase-config.js';
    import { auth, signInWithEmailAndPassword } from './js/firebase-auth.js';
    import { setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { addDoc, collection, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const googleProvider = new GoogleAuthProvider();

    // EMAILS AUTORIZADOS (Master)
    const adminsAutorizados = ['emilianofilgueira@gmail.com', 'lemacafesrl@gmail.com'];

    // Verifica si un user tiene permisos admin (igual que admin-guard.js)
    async function esAdmin(user) {
        if (adminsAutorizados.includes(user.email)) return true;
        const [adminsSnap, adminSnap] = await Promise.all([
            getDoc(doc(db, 'admins', user.uid)),
            getDoc(doc(db, 'admin', user.uid))
        ]);
        return adminsSnap.exists() || adminSnap.exists();
    }

    // Manejo Google Login
    document.getElementById("btnGoogle").onclick = async () => {
        document.getElementById("loader").style.display = "block";
        document.getElementById("errorMsg").style.display = "none";
        document.getElementById("noAdminMsg").style.display = "none";

        try {
            await setPersistence(auth, browserLocalPersistence);
            const res = await signInWithPopup(auth, googleProvider);
            const user = res.user;

            if (await esAdmin(user)) {
                loginExitoso(user.email);
            } else {
                auth.signOut();
                throw new Error("unauthorized");
            }
        } catch (error) {
            console.error(error);
            document.getElementById("loader").style.display = "none";
            if(error.message === "unauthorized") {
                document.getElementById("noAdminMsg").style.display = "block";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }
    };

    function loginExitoso(usuario) {
        localStorage.setItem("admin", "true");
        localStorage.setItem("usuario", usuario);
        sessionStorage.setItem("logueado", "true");
        window.location.href = "admin.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const usuario = document.getElementById("usuario").value.trim();
      const clave = document.getElementById("clave").value.trim();

      document.getElementById("loader").style.display = "block";
      document.getElementById("errorMsg").style.display = "none";

      try {
        await setPersistence(auth, browserLocalPersistence);
        const cred = await signInWithEmailAndPassword(auth, usuario, clave);
        const user = cred.user;

        // Verificar que sea admin (igual que admin-guard.js)
        if (!(await esAdmin(user))) {
            await auth.signOut();
            document.getElementById("loader").style.display = "none";
            document.getElementById("noAdminMsg").style.display = "block";
            return;
        }

        localStorage.setItem("admin", "true");
        localStorage.setItem("usuario", usuario);
        sessionStorage.setItem("logueado", "true");

        await addDoc(collection(db, "logs"), {
          usuario,
          accion: "iniciar_sesion",
          detalles: "Login exitoso",
          timestamp: new Date()
        });

        if (typeof gtag === 'function') {
          gtag('event', 'admin_login');
        }

        loginExitoso(usuario);
      } catch (error) {
        console.error("Error en login:", error);
        document.getElementById("loader").style.display = "none";
        document.getElementById("errorMsg").style.display = "block";
      }
    });
  </script>
</body>
</html>
