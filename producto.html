<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Córcega Café - Producto</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/tienda/tienda.css?v=1.9">
    <style>
        .product-page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 80px;
            position: relative;
            z-index: 10;
        }

        .breadcrumb-minimal {
            display: flex;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-muted);
            margin-bottom: 40px;
            justify-content: center;
            opacity: 0.7;
        }
        .breadcrumb-minimal a { color: inherit; text-decoration: none; transition: color 0.3s; }
        .breadcrumb-minimal a:hover { color: var(--naranja-accent); }

        .product-main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        /* Foto principal */
        .product-gallery {
            position: sticky;
            top: 120px;
        }

        .main-image-wrapper {
            background: white;
            padding: 15px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(1, 50, 63, 0.08);
            transition: transform 0.3s ease;
        }
        .main-image-wrapper:hover {
            transform: scale(1.02);
        }

        .image-aspect {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            background: #fdfcf7;
        }

        .image-aspect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s;
        }

        .gallery-thumbs-grid {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }
        .thumb {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            background: white;
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .thumb.active {
            border-color: var(--naranja-accent);
            transform: translateY(-5px);
        }

        /* Info derecha */
        .info-col {
            padding-top: 20px;
        }

        .cat-tag {
            display: inline-block;
            background: rgba(237, 112, 83, 0.1);
            color: var(--naranja-accent);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .info-col h1 {
            font-family: var(--font-display);
            font-size: 56px;
            line-height: 1;
            margin-bottom: 20px;
            color: var(--panel-oscuro);
        }

        .price-hero {
            font-size: 38px;
            font-weight: 800;
            color: var(--naranja-accent);
            margin-bottom: 40px;
            display: block;
        }

        .product-bio {
            font-size: 17px;
            line-height: 1.8;
            color: #4a5568;
            margin-bottom: 50px;
            border-left: 3px solid rgba(237, 112, 83, 0.2);
            padding-left: 25px;
        }

        /* Caja de Accion */
        .action-box {
            background: white;
            padding: 35px;
            border-radius: 28px;
            box-shadow: 0 15px 45px rgba(1, 50, 63, 0.05);
            border: 1px solid rgba(1, 50, 63, 0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .qty-picker {
            display: flex;
            align-items: center;
            background: #f7f8fa;
            border-radius: 14px;
            padding: 6px;
        }
        .qty-picker button {
            width: 44px;
            height: 44px;
            border: none;
            background: white;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .qty-picker button:hover { background: var(--bg-crema); }
        .qty-picker span {
            width: 50px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
        }

        .btn-main-buy {
            flex: 1;
            height: 56px;
            background: var(--panel-oscuro);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-main-buy:hover {
            background: var(--naranja-accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(237, 112, 83, 0.3);
        }

        @media (max-width: 950px) {
            .product-main-grid { grid-template-columns: 1fr; gap: 40px; }
            .product-gallery { position: relative; top: 0; }
            .info-col h1 { font-size: 42px; }
            .product-page-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <header>
            <img src="css/img/Corcega_Logo_Original.png" alt="Logo" class="logo-tienda" onclick="window.location.href='tienda.html'" style="cursor:pointer">
            <h1>TIENDA<br>CÓRCEGA</h1>
            <div class="header-actions">
                <a href="tienda-cuenta.html" title="Mi Cuenta" id="user-link">
                    <span id="user-greeting" style="font-family: var(--font-sync); font-size: 9px; margin-right: 10px; color: var(--panel-oscuro); display: none;"></span>
                    <i class="fas fa-user-circle"></i>
                </a>
                <div class="cart-icon" id="cart-btn-header">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count-badge">0</span>
                </div>
            </div>
        </header>
    </div>

    <div class="product-page-container">
        <!-- Minimal Breadcrumbs -->
        <nav class="breadcrumb-minimal">
            <a href="tienda.html">Tienda</a>
            <span>/</span>
            <span id="breadcrumb-category">Categoría</span>
            <span>/</span>
            <span id="breadcrumb-name" style="color: var(--panel-oscuro); font-weight: 800;">Torta</span>
        </nav>

        <div id="main-product-loader" style="text-align: center; padding: 100px;">
            <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--naranja-accent);"></i>
        </div>

        <div class="product-main-grid" id="product-content" style="display: none;">
            <!-- Izquierda -->
            <div class="product-gallery">
                <div class="main-image-wrapper">
                    <div class="image-aspect">
                        <img id="main-prod-img" src="" alt="">
                    </div>
                </div>
                <div class="gallery-thumbs-grid" id="gallery-thumbs-list">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Derecha -->
            <div class="info-col">
                <span class="cat-tag" id="prod-cat-tag">CAFETERÍA</span>
                <h1 id="prod-title">Cargando...</h1>
                <span class="price-hero" id="prod-price">$0.00</span>
                
                <div class="product-bio" id="prod-desc">
                    Explora los sabores únicos de nuestra selección artesanal...
                </div>

                <div class="action-box">
                    <div class="controls-row">
                        <div class="qty-picker">
                            <button onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                            <span id="prod-qty">1</span>
                            <button onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <button class="btn-main-buy" id="btn-add-to-cart-page">
                            <i class="fas fa-shopping-cart"></i> AGREGAR AL CARRITO
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Buttons & Cart Overlay -->
    <button class="cart-floating" id="btn-open-cart">
        <i class="fas fa-shopping-bag"></i>
        <div class="cart-count" id="cart-badge">0</div>
    </button>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Mi Carrito</h2>
            <button class="btn-close-cart" id="btn-close-cart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span class="total-label">Total estimado</span>
                <span class="total-amount" id="cart-total">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-go-to-checkout">CONTINUAR COMPRA</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/tienda/producto-detalle.js?v=1.2"></script>
</body>
</html>
