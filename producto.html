<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Córcega Café - Producto</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/tienda/tienda.css?v=1.9">

    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXMC00DZ81"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        gtag('config', 'G-NXMC00DZ81');

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wd8ekvw8tt");

    <style>
        .product-page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 40px 60px;
            position: relative;
            z-index: 10;
        }

        .breadcrumb-minimal {
            display: flex;
            gap: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--texto-muted);
            margin-bottom: 30px;
            justify-content: center;
            opacity: 0.6;
        }
        .breadcrumb-minimal a { color: inherit; text-decoration: none; transition: color 0.3s; }
        .breadcrumb-minimal a:hover { color: var(--naranja-accent); }

        .product-main-grid {
            display: grid;
            grid-template-columns: 45% 55%;
            gap: 50px;
            align-items: center;
        }

        /* Foto principal */
        .product-gallery {
            position: relative;
        }

        .main-image-wrapper {
            background: white;
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(1, 50, 63, 0.06);
        }

        .image-aspect {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(90deg, #f0f0ee 25%, #e8e8e5 50%, #f0f0ee 75%);
            background-size: 200% 100%;
            animation: prodImgSkeleton 1.4s ease-in-out infinite;
        }
        .image-aspect.img-loaded {
            background: #fdfcf7;
            animation: none;
        }
        @keyframes prodImgSkeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .image-aspect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .gallery-thumbs-grid {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .thumb {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            background: white;
            padding: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .thumb.active {
            border-color: var(--naranja-accent);
        }

        /* Info derecha */
        .info-col {
            padding-left: 10px;
        }

        .cat-tag {
            display: inline-block;
            background: rgba(237, 112, 83, 0.1);
            color: var(--naranja-accent);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .info-col h1 {
            font-family: var(--font-display);
            font-size: 40px;
            line-height: 1.1;
            margin-bottom: 15px;
            color: var(--panel-oscuro);
        }

        .price-hero {
            font-size: 28px;
            font-weight: 800;
            color: var(--naranja-accent);
            margin-bottom: 25px;
            display: block;
        }

        .product-bio {
            font-size: 15px;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 35px;
            border-left: 3px solid rgba(237, 112, 83, 0.15);
            padding-left: 20px;
        }

        /* Caja de Accion */
        .action-box {
            background: white;
            padding: 15px 20px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(1, 50, 63, 0.04);
            border: 1px solid rgba(1, 50, 63, 0.02);
            display: inline-flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-picker {
            display: flex;
            align-items: center;
            background: #f7f8fa;
            border-radius: 10px;
            padding: 2px;
            height: 40px;
        }
        .qty-picker button {
            width: 32px;
            height: 32px;
            border: none;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--panel-oscuro);
            transition: all 0.2s;
        }
        .qty-picker button:hover {
            background: var(--naranja-accent);
            color: white;
        }
        .qty-picker span {
            width: 35px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-main-buy {
            flex: 1;
            height: 40px;
            padding: 0 15px;
            background: var(--panel-oscuro);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-main-buy:hover {
            background: var(--naranja-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(237, 112, 83, 0.25);
        }

        @media (max-width: 950px) {
            .product-main-grid { grid-template-columns: 1fr; gap: 40px; }
            .product-gallery { position: relative; top: 0; }
            .info-col h1 { font-size: 42px; }
            .product-page-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <header id="main-header"></header>
    </div>

    <div class="product-page-container">
        <!-- Minimal Breadcrumbs -->
        <nav class="breadcrumb-minimal">
            <a href="tienda.html">Tienda</a>
            <span>/</span>
            <span id="breadcrumb-category">Categoría</span>
            <span>/</span>
            <span id="breadcrumb-name" style="color: var(--panel-oscuro); font-weight: 800;">Torta</span>
        </nav>

        <div id="main-product-loader" class="corcega-loader-container" style="padding: 100px 20px;">
            <div class="corcega-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <p class="corcega-loader-text">Cargando producto...</p>
        </div>

        <div class="product-main-grid" id="product-content" style="display: none;">
            <!-- Izquierda -->
            <div class="product-gallery">
                <div class="main-image-wrapper">
                    <div class="image-aspect">
                        <img id="main-prod-img" src="" alt="">
                    </div>
                </div>
                <div class="gallery-thumbs-grid" id="gallery-thumbs-list">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Derecha -->
            <div class="info-col">
                <span class="cat-tag" id="prod-cat-tag">CAFETERÍA</span>
                <h1 id="prod-title">Cargando...</h1>
                <span class="price-hero" id="prod-price">$0.00</span>
                
                <div class="product-bio" id="prod-desc">
                    Explora los sabores únicos de nuestra selección artesanal...
                </div>

                <!-- Variantes -->
                <div id="prod-variantes-section" style="display:none; margin-bottom:20px;">
                    <div id="prod-variantes-list" style="display:flex; flex-direction:column; gap:16px;"></div>
                </div>

                <div class="action-box">
                    <div id="prod-stock-info" style="display:none; font-size:0.8rem; font-weight:600; padding:7px 12px; border-radius:8px;"></div>
                    <div class="controls-row">
                        <div class="qty-picker">
                            <button onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                            <span id="prod-qty">1</span>
                            <button onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <button class="btn-main-buy" id="btn-add-to-cart-page">
                            <i class="fas fa-shopping-cart"></i> AGREGAR AL CARRITO
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Buttons & Cart Overlay -->
    <button class="cart-floating" id="btn-open-cart">
        <i class="fas fa-shopping-bag"></i>
        <div class="cart-count" id="cart-badge">0</div>
    </button>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Mi Carrito</h2>
            <button class="btn-close-cart" id="btn-close-cart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span class="total-label">Total estimado</span>
                <span class="total-amount" id="cart-total">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-go-to-checkout">CONTINUAR COMPRA</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/tienda/header-component.js?v=1.0"></script>
    <script type="module" src="js/tienda/producto-detalle.js?v=1.5"></script>
    <footer id="main-footer"></footer>
    <script type="module" src="js/tienda/footer-component.js?v=1.2"></script>
</body>
</html>
