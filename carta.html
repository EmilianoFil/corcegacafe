<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta — Córcega Café</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d86634;
            --secondary: #0d2b37;
            --bg: #fdfcf7;
            --white: #ffffff;
            --border: #e8e4db;
            --text: #1d1d1d;
            --muted: #888;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 18px 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .header-top img { width: 38px; }

        .header-top h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--secondary);
        }

        /* ── Tabs de secciones ── */
        .tabs-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 0;
            scrollbar-width: none;
        }
        .tabs-scroll::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            padding: 8px 18px;
            border: none;
            border-radius: 30px 30px 0 0;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        /* ── Contenido ── */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px 80px;
        }

        .seccion-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--secondary);
            margin-bottom: 18px;
            padding-top: 4px;
        }

        /* ── Cards de platos ── */
        .platos-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .plato-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            gap: 0;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .plato-card:active {
            transform: scale(0.985);
        }

        .plato-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.07);
        }

        .plato-info {
            flex: 1;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }

        .plato-nombre {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.3;
        }

        .plato-desc {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .plato-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .plato-precio {
            font-weight: 800;
            font-size: 1rem;
            color: var(--secondary);
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 20px;
            background: #f0f0f0;
            color: #666;
            font-weight: 600;
        }
        .tag.vegetariano { background: #e8f5e9; color: #2d6a4f; }
        .tag.vegano       { background: #e8f5e9; color: #1b5e20; }
        .tag.sin-tacc     { background: #fff3e0; color: #e65100; }
        .tag.destacado    { background: #fff8e1; color: #f57f17; }

        .plato-foto {
            width: 100px;
            min-height: 100px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .plato-foto-placeholder {
            width: 100px;
            background: #f5f3ee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        /* ── Modal detalle ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: var(--white);
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .modal-fotos {
            position: relative;
            background: #111;
            aspect-ratio: 4/3;
            overflow: hidden;
        }

        .modal-fotos img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .modal-fotos img.visible { display: block; }

        .foto-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        .foto-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.2s;
        }
        .foto-dot.active { background: white; }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.35);
            border: none;
            color: white;
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-nav.prev { left: 10px; }
        .modal-nav.next { right: 10px; }

        .modal-body { padding: 20px 20px 36px; }

        .modal-nombre {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .modal-precio {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }

        .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

        /* ── Loader ── */
        #loader {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state p { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <img src="css/img/Corcega_Logo_Original.png" alt="Logo Córcega">
        <h1>Córcega Café</h1>
    </div>
    <div class="tabs-scroll" id="tabs-secciones">
        <!-- tabs dinámicos -->
    </div>
</header>

<main id="main-content">
    <div id="loader">Cargando carta...</div>
</main>

<!-- Modal detalle de plato -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
    <div class="modal-sheet" id="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-fotos" id="modal-fotos">
            <!-- fotos dinámicas -->
        </div>
        <div class="modal-body">
            <p class="modal-nombre" id="modal-nombre"></p>
            <p class="modal-desc" id="modal-desc"></p>
            <p class="modal-precio" id="modal-precio"></p>
            <div class="modal-tags" id="modal-tags"></div>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './js/firebase-config.js';
    import {
        collection, getDocs, query, orderBy, where
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    let secciones = [];
    let platos = [];
    let seccionActiva = null;
    let fotoActualIdx = 0;

    // ─── Carga inicial ───────────────────────────────────────────────────────

    async function init() {
        const [snapSec, snapPlatos] = await Promise.all([
            getDocs(query(collection(db, 'carta_secciones'), orderBy('orden'))),
            getDocs(query(collection(db, 'carta_platos'), orderBy('orden')))
        ]);

        secciones = snapSec.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .filter(s => s.activa !== false);

        platos = snapPlatos.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .filter(p => p.activo !== false);

        if (!secciones.length) {
            document.getElementById('loader').textContent = 'La carta está en preparación. ¡Volvé pronto!';
            return;
        }

        renderTabs();
        activarSeccion(secciones[0].id);
    }

    // ─── Tabs ────────────────────────────────────────────────────────────────

    function renderTabs() {
        const container = document.getElementById('tabs-secciones');
        container.innerHTML = secciones.map(s => `
            <button class="tab-btn" data-id="${s.id}" onclick="window._activarSeccion('${s.id}')">
                ${s.nombre}
            </button>
        `).join('');
    }

    window._activarSeccion = activarSeccion;

    function activarSeccion(id) {
        seccionActiva = id;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.id === id);
        });
        // Scroll el tab activo al centro
        const activeBtn = document.querySelector(`.tab-btn[data-id="${id}"]`);
        activeBtn?.scrollIntoView({ inline: 'center', behavior: 'smooth' });

        renderPlatos(id);
    }

    // ─── Platos ──────────────────────────────────────────────────────────────

    function renderPlatos(seccionId) {
        const main = document.getElementById('main-content');
        const seccion = secciones.find(s => s.id === seccionId);
        const platosSeccion = platos.filter(p => p.seccionId === seccionId);

        if (!platosSeccion.length) {
            main.innerHTML = `
                <div class="empty-state">
                    <span style="font-size:2.5rem;">🍽️</span>
                    <p>Esta sección todavía no tiene platos.</p>
                </div>`;
            return;
        }

        const TAG_LABELS = {
            'vegetariano': '🌱 Vegetariano',
            'vegano':      '🌿 Vegano',
            'sin-tacc':    '⚠️ Sin TACC',
            'destacado':   '⭐ Destacado',
        };

        main.innerHTML = `
            <p class="seccion-titulo">${seccion?.nombre ?? ''}</p>
            <div class="platos-grid">
                ${platosSeccion.map(p => {
                    const foto = p.fotos?.[0] ?? '';
                    const precio = p.precio != null ? `$${Number(p.precio).toLocaleString('es-AR')}` : '';
                    const tags = (p.tags ?? []).map(t => `<span class="tag ${t}">${TAG_LABELS[t] ?? t}</span>`).join('');
                    return `
                    <div class="plato-card" onclick="window._abrirModal('${p.id}')">
                        <div class="plato-info">
                            <p class="plato-nombre">${p.nombre}</p>
                            ${p.descripcion ? `<p class="plato-desc">${p.descripcion}</p>` : ''}
                            <div class="plato-footer">
                                ${precio ? `<span class="plato-precio">${precio}</span>` : ''}
                                ${tags}
                            </div>
                        </div>
                        ${foto
                            ? `<img class="plato-foto" src="${foto}" alt="${p.nombre}" loading="lazy">`
                            : `<div class="plato-foto-placeholder">🍽️</div>`}
                    </div>`;
                }).join('')}
            </div>`;
    }

    // ─── Modal ───────────────────────────────────────────────────────────────

    window._abrirModal = function(id) {
        const p = platos.find(pl => pl.id === id);
        if (!p) return;

        fotoActualIdx = 0;
        const fotos = p.fotos ?? [];

        // Fotos
        const fotosEl = document.getElementById('modal-fotos');
        if (fotos.length) {
            fotosEl.innerHTML = fotos.map((url, i) => `
                <img src="${url}" class="${i === 0 ? 'visible' : ''}" alt="">
            `).join('') +
            (fotos.length > 1 ? `
                <button class="modal-nav prev" onclick="navFoto(-1)">‹</button>
                <button class="modal-nav next" onclick="navFoto(1)">›</button>
                <div class="foto-dots">
                    ${fotos.map((_, i) => `<div class="foto-dot ${i === 0 ? 'active' : ''}" onclick="irFoto(${i})"></div>`).join('')}
                </div>
            ` : '');
            fotosEl.style.display = 'block';
        } else {
            fotosEl.innerHTML = `<div style="height:180px; background:#f0ece4; display:flex; align-items:center; justify-content:center; font-size:3rem;">🍽️</div>`;
        }

        const TAG_LABELS = {
            'vegetariano': '🌱 Vegetariano',
            'vegano':      '🌿 Vegano',
            'sin-tacc':    '⚠️ Sin TACC',
            'destacado':   '⭐ Destacado',
        };

        document.getElementById('modal-nombre').textContent = p.nombre;
        document.getElementById('modal-desc').textContent = p.descripcion ?? '';
        document.getElementById('modal-precio').textContent = p.precio != null ? `$${Number(p.precio).toLocaleString('es-AR')}` : '';
        document.getElementById('modal-tags').innerHTML = (p.tags ?? []).map(t => `<span class="tag ${t}">${TAG_LABELS[t] ?? t}</span>`).join('');

        document.getElementById('modal-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    };

    window.cerrarModal = function(e) {
        if (e.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }
    };

    window.navFoto = function(dir) {
        const imgs = document.querySelectorAll('#modal-fotos img');
        const dots = document.querySelectorAll('.foto-dot');
        if (!imgs.length) return;
        imgs[fotoActualIdx].classList.remove('visible');
        dots[fotoActualIdx]?.classList.remove('active');
        fotoActualIdx = (fotoActualIdx + dir + imgs.length) % imgs.length;
        imgs[fotoActualIdx].classList.add('visible');
        dots[fotoActualIdx]?.classList.add('active');
    };

    window.irFoto = function(idx) {
        const imgs = document.querySelectorAll('#modal-fotos img');
        const dots = document.querySelectorAll('.foto-dot');
        imgs[fotoActualIdx].classList.remove('visible');
        dots[fotoActualIdx]?.classList.remove('active');
        fotoActualIdx = idx;
        imgs[fotoActualIdx].classList.add('visible');
        dots[fotoActualIdx]?.classList.add('active');
    };

    // Swipe en el modal
    let touchStartX = 0;
    document.getElementById('modal-fotos').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.getElementById('modal-fotos').addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) navFoto(diff > 0 ? 1 : -1);
    });

    init();
</script>
</body>
</html>
