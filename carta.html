<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta — Córcega Café</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark:   #01323f;
            --coral:  #ed7053;
            --bg:     #fdfcf7;
            --border: #e0dbd2;
            --muted:  #7a7a7a;
            --white:  #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1d1d1d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('css/img/wallpaper.png');
            background-repeat: repeat;
            background-size: 600px;
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
        }

        /* ── Header ── */
        header {
            background: var(--dark);
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(1,50,63,0.18);
            /* fuerza compositing layer en iOS Safari — arregla taps en sticky */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        .header-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 20px 12px;
        }

        .header-top img {
            width: 44px;
            filter: brightness(0) invert(1);
        }

        .header-top h1 {
            font-family: 'Syncopate', serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── Tabs ── */
        .tabs-scroll {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tabs-scroll::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            padding: 13px 22px;
            border: none;
            background: transparent;
            font-family: 'Syncopate', serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
            /* elimina delay de 300ms en iOS */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            color: var(--coral);
            border-bottom-color: var(--coral);
        }

        /* ── Contenido ── */
        main {
            max-width: 640px;
            width: 100%;
            margin: 0 auto;
            padding: 28px 16px 80px;
            flex: 1;
        }

        /* ── Sección ── */
        .carta-seccion {
            margin-bottom: 40px;
            /* espacio para que el sticky header no tape el título al scrollear */
            scroll-margin-top: calc(var(--header-h, 120px) + 12px);
        }

        .seccion-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-style: italic;
            color: var(--dark);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Cards ── */
        .platos-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .plato-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(1,50,63,0.05);
        }
        .plato-card:active { transform: scale(0.985); }
        .plato-card:hover  { box-shadow: 0 6px 20px rgba(1,50,63,0.1); }

        .plato-info {
            flex: 1;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            min-width: 0;
        }

        .plato-nombre {
            font-family: 'Syncopate', serif;
            font-weight: 700;
            font-size: 0.68rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--dark);
            line-height: 1.45;
        }

        .plato-desc {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .plato-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .plato-precio {
            font-family: 'Syncopate', serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--coral);
        }

        .tag {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 20px;
            background: #f0f0f0;
            color: #666;
            font-weight: 600;
        }
        .tag.vegetariano { background: #e8f5e9; color: #2d6a4f; }
        .tag.vegano       { background: #e8f5e9; color: #1b5e20; }
        .tag.sin-tacc     { background: white; color: #c0392b; border: 1px solid #eee; padding: 2px 6px 2px 2px; }
        .tag.sin-tacc img { height: 16px; width: auto; vertical-align: middle; margin-right: 3px; display: inline-block; }
        .tag.destacado    { background: #fff8e1; color: #c17900; }

        .plato-foto {
            width: 110px;
            min-height: 110px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .plato-foto-placeholder {
            width: 110px;
            background: #f0ece4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1,50,63,0.65);
            z-index: 999;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: var(--white);
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-width: 640px;
            max-height: 92vh;
            overflow-y: auto;
            animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .modal-fotos {
            position: relative;
            background: #111;
            aspect-ratio: 4/3;
            overflow: hidden;
        }

        .modal-fotos img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .modal-fotos img.visible { display: block; }

        .foto-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        .foto-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: background 0.2s;
        }
        .foto-dot.active { background: white; }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            font-size: 1.2rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-nav.prev { left: 10px; }
        .modal-nav.next { right: 10px; }

        .modal-body { padding: 22px 20px 40px; }

        .modal-nombre {
            font-family: 'Syncopate', serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dark);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .modal-desc {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .modal-precio {
            font-family: 'Syncopate', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--coral);
        }

        .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

        /* ── Botón HD ── */
        .btn-hd {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            font-family: 'Syncopate', serif;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s;
        }
        .btn-hd:active { background: rgba(0,0,0,0.7); }
        .btn-hd.loaded { border-color: var(--coral); color: var(--coral); }

        /* ── Estados ── */
        #loader, .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--muted);
            font-family: 'Syncopate', serif;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-top">
        <img src="css/img/Corcega_Logo_Original.png" alt="Córcega">
        <h1>Córcega Café</h1>
    </div>
    <div class="tabs-scroll" id="tabs-secciones"></div>
</header>

<main id="main-content">
    <div id="loader">Cargando carta...</div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-fotos" id="modal-fotos"></div>
        <div class="modal-body">
            <p class="modal-nombre" id="modal-nombre"></p>
            <p class="modal-desc"   id="modal-desc"></p>
            <p class="modal-precio" id="modal-precio"></p>
            <div class="modal-tags" id="modal-tags"></div>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './js/firebase-config.js';
    import {
        collection, getDocs, query, orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // Compatibilidad: foto puede ser string (viejo) o {thumb,medium,full} (nuevo)
    const fotoThumb  = f => typeof f === 'string' ? f : (f?.thumb  ?? '');
    const fotoMedium = f => typeof f === 'string' ? f : (f?.medium ?? f?.thumb ?? '');
    const fotoFull   = f => typeof f === 'string' ? f : (f?.full   ?? f?.medium ?? f?.thumb ?? '');

    const TAG_LABELS = {
        'vegetariano': '🌱 Vegetariano',
        'vegano':      '🌿 Vegano',
        'sin-tacc':    '<img src="css/img/sin-tacc.svg" alt="Sin TACC"> Sin T.A.C.C.',
        'destacado':   '⭐ Destacado',
    };

    let platos = [];
    let fotoIdx = 0;
    let pausaObserver = false;  // evita que el observer pise el tab activo durante scroll programático
    let pausaTimer    = null;

    // ── Evita scroll restoration del browser que tapa el header ──────────────
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

    // ── Carga ────────────────────────────────────────────────────────────────
    async function init() {
        try {
            const [snapSec, snapPlatos] = await Promise.all([
                getDocs(query(collection(db, 'carta_secciones'), orderBy('orden'))),
                getDocs(query(collection(db, 'carta_platos'),    orderBy('orden')))
            ]);

            const secciones = snapSec.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(s => s.activa !== false);

            platos = snapPlatos.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(p => p.activo !== false);

            if (!secciones.length) {
                document.getElementById('loader').textContent = 'Carta en preparación — volvé pronto';
                return;
            }

            renderTabs(secciones);
            renderContenido(secciones);
            initScrollSpy(secciones);

            // Ajustar scroll-margin-top dinámicamente según altura del header
            const headerH = document.getElementById('main-header').offsetHeight;
            document.querySelectorAll('.carta-seccion').forEach(el => {
                el.style.scrollMarginTop = (headerH + 12) + 'px';
            });

        } catch (err) {
            console.error(err);
            document.getElementById('loader').textContent = 'Error al cargar la carta';
        }
    }

    // ── Tabs ─────────────────────────────────────────────────────────────────
    function renderTabs(secciones) {
        document.getElementById('tabs-secciones').innerHTML = secciones.map(s =>
            `<button class="tab-btn" data-id="${s.id}" onclick="scrollASeccion('${s.id}')">${s.nombre}</button>`
        ).join('');
        // activar el primero
        document.querySelector('.tab-btn')?.classList.add('active');
    }

    function activarTab(id) {
        document.querySelectorAll('.tab-btn').forEach(b =>
            b.classList.toggle('active', b.dataset.id === id)
        );
        // Scroll horizontal del contenedor de tabs para centrar el activo
        // — sin scrollIntoView que arrastra la página verticalmente
        const tabsEl = document.getElementById('tabs-secciones');
        const btn    = tabsEl.querySelector(`.tab-btn[data-id="${id}"]`);
        if (btn) {
            const offset = btn.offsetLeft - tabsEl.clientWidth / 2 + btn.offsetWidth / 2;
            tabsEl.scrollTo({ left: offset, behavior: 'smooth' });
        }
    }

    window.scrollASeccion = function(id) {
        const el      = document.getElementById('sec-' + id);
        const headerH = document.getElementById('main-header').offsetHeight;
        if (!el) return;

        activarTab(id);

        // Pausar el observer durante el scroll animado para que no lo pise
        pausaObserver = true;
        clearTimeout(pausaTimer);
        pausaTimer = setTimeout(() => { pausaObserver = false; }, 900);

        const top = el.getBoundingClientRect().top + window.scrollY - headerH - 8;
        window.scrollTo({ top, behavior: 'smooth' });
    };

    // ── Contenido único (scroll largo) ───────────────────────────────────────
    function renderContenido(secciones) {
        const main = document.getElementById('main-content');
        main.innerHTML = secciones.map(s => {
            const lista = platos.filter(p => p.seccionId === s.id);
            const items = lista.length
                ? lista.map(p => cardPlato(p)).join('')
                : `<p style="color:var(--muted);font-size:0.8rem;padding:10px 0;">Sección en preparación.</p>`;
            return `
                <section class="carta-seccion" id="sec-${s.id}" data-seccion-id="${s.id}">
                    <h2 class="seccion-titulo">${s.nombre}</h2>
                    <div class="platos-grid">${items}</div>
                </section>`;
        }).join('');
    }

    function cardPlato(p) {
        const thumb  = fotoThumb(p.fotos?.[0]);
        const precio = p.precio != null ? `$${Number(p.precio).toLocaleString('es-AR')}` : '';
        const tags   = (p.tags ?? []).map(t => `<span class="tag ${t}">${TAG_LABELS[t] ?? t}</span>`).join('');
        return `
        <div class="plato-card" onclick="abrirModal('${p.id}')">
            <div class="plato-info">
                <p class="plato-nombre">${p.nombre}</p>
                ${p.descripcion ? `<p class="plato-desc">${p.descripcion}</p>` : ''}
                <div class="plato-footer">
                    ${precio ? `<span class="plato-precio">${precio}</span>` : ''}
                    ${tags}
                </div>
            </div>
            ${thumb
                ? `<img class="plato-foto" src="${thumb}" alt="${p.nombre}" loading="lazy">`
                : `<div class="plato-foto-placeholder">🍽️</div>`}
        </div>`;
    }

    // ── Scroll spy (actualiza tab activo al scrollear manualmente) ───────────
    function initScrollSpy(secciones) {
        const observer = new IntersectionObserver(entries => {
            if (pausaObserver) return;
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                activarTab(entry.target.dataset.seccionId);
            });
        }, { rootMargin: '-15% 0px -75% 0px' });

        secciones.forEach(s => {
            const el = document.getElementById('sec-' + s.id);
            if (el) observer.observe(el);
        });
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    let _fotosModal = []; // guarda los objetos foto del plato abierto

    window.abrirModal = function(id) {
        const p = platos.find(pl => pl.id === id);
        if (!p) return;

        fotoIdx    = 0;
        _fotosModal = p.fotos ?? [];
        const fotosEl = document.getElementById('modal-fotos');

        fotosEl.innerHTML = _fotosModal.length
            ? _fotosModal.map((f, i) =>
                `<img src="${fotoMedium(f)}" data-full="${fotoFull(f)}" class="${i === 0 ? 'visible' : ''}" alt="">`
              ).join('')
              + ((_fotosModal.length > 1) ? `
                <button class="modal-nav prev" onclick="navFoto(-1)">‹</button>
                <button class="modal-nav next" onclick="navFoto(1)">›</button>
                <div class="foto-dots">
                    ${_fotosModal.map((_, i) => `<div class="foto-dot ${i===0?'active':''}" onclick="irFoto(${i})"></div>`).join('')}
                </div>` : '')
              + `<button class="btn-hd" onclick="verFullHD()" title="Ver en Full HD">HD</button>`
            : `<div style="height:200px;background:#f0ece4;display:flex;align-items:center;justify-content:center;font-size:3rem;">🍽️</div>`;

        document.getElementById('modal-nombre').textContent = p.nombre;
        document.getElementById('modal-desc').textContent   = p.descripcion ?? '';
        document.getElementById('modal-precio').textContent =
            p.precio != null ? `$${Number(p.precio).toLocaleString('es-AR')}` : '';
        document.getElementById('modal-tags').innerHTML =
            (p.tags ?? []).map(t => `<span class="tag ${t}">${TAG_LABELS[t] ?? t}</span>`).join('');

        document.getElementById('modal-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    };

    window.verFullHD = function() {
        const img = document.querySelectorAll('#modal-fotos img')[fotoIdx];
        if (!img) return;
        const fullSrc = img.dataset.full;
        if (!fullSrc || img.src === fullSrc) return;
        const btn = document.querySelector('.btn-hd');
        if (btn) btn.textContent = '...';
        const tmp = new Image();
        tmp.onload = () => {
            img.src = fullSrc;
            if (btn) { btn.textContent = 'HD'; btn.classList.add('loaded'); }
        };
        tmp.src = fullSrc;
    };

    window.cerrarModal = function(e) {
        if (e.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }
    };

    window.navFoto = function(dir) {
        const imgs = document.querySelectorAll('#modal-fotos img');
        const dots = document.querySelectorAll('.foto-dot');
        if (!imgs.length) return;
        imgs[fotoIdx].classList.remove('visible');
        dots[fotoIdx]?.classList.remove('active');
        fotoIdx = (fotoIdx + dir + imgs.length) % imgs.length;
        imgs[fotoIdx].classList.add('visible');
        dots[fotoIdx]?.classList.add('active');
    };

    window.irFoto = function(idx) {
        const imgs = document.querySelectorAll('#modal-fotos img');
        const dots = document.querySelectorAll('.foto-dot');
        imgs[fotoIdx].classList.remove('visible');
        dots[fotoIdx]?.classList.remove('active');
        fotoIdx = idx;
        imgs[fotoIdx].classList.add('visible');
        dots[fotoIdx]?.classList.add('active');
    };

    // Swipe táctil
    let tx = 0;
    document.getElementById('modal-fotos').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    document.getElementById('modal-fotos').addEventListener('touchend',   e => {
        const diff = tx - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) navFoto(diff > 0 ? 1 : -1);
    });

    init();
</script>

<div id="copyright-container"></div>
<script>
  fetch("footer-copyright.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("copyright-container").innerHTML = html;
      const yearSpan = document.getElementById("year");
      if (yearSpan) yearSpan.textContent = new Date().getFullYear();
    });
</script>

</body>
</html>
