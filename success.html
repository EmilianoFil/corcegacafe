<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de tu Pedido - Córcega Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tienda/tienda.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fdfcf7; }
        .success-card {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        
        /* Stepper Styles */
        .stepper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 30px;
            width: 2px;
            height: 20px;
            background: #eee;
        }
        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            z-index: 1;
        }
        .step.active .step-icon { background: #4BB543; }
        .step.error .step-icon { background: #d86634; }
        .step-text { font-size: 15px; font-weight: 500; color: #aaa; }
        .step.active .step-text { color: var(--panel-oscuro); font-weight: 700; }
        .step.error .step-text { color: #d86634; }

        .btn-retry {
            background: #009ee3;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 158, 227, 0.2);
        }
        
        .btn-wa {
            background: #25d366;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-primary-corcega {
            background: #d1643c;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(209, 100, 60, 0.2);
        }

        .btn-outline-corcega {
            background: white;
            color: #d1643c;
            border: 2px solid #d1643c;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-retry:hover, .btn-wa:hover, .btn-primary-corcega:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .order-badge {
            background: #fdf6f2;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            color: #d1643c;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(209, 100, 60, 0.1);
        }

        /* Spinner */
        .loader-container {
            padding: 50px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d86634;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXMC00DZ81"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NXMC00DZ81');
    </script>
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wd8ekvw8tt");
    </script>
</head>
<body>
    <div class="success-card">
        <div id="status-header">
            <h1 id="main-title" style="font-family: 'Playfair Display', serif; margin-bottom: 5px;">Buscando...</h1>
            <div id="order-id-badge" class="order-badge">Consultando sistema...</div>
        </div>

        <!-- Loader -->
        <div id="order-loader" class="loader-container">
            <div class="spinner"></div>
            <p style="font-size: 13px; color: #999; margin-top: 15px;">Estamos trayendo los detalles de tu pedido...</p>
        </div>

        <div class="stepper" id="order-stepper" style="display: none; animation: fadeIn 0.8s ease forwards;">
            <div class="step active" id="step-recibido">
                <div class="step-icon"><i class="fas fa-check"></i></div>
                <div class="step-text">Pedido recibido</div>
            </div>
            <div class="step" id="step-pago">
                <div class="step-icon"><i class="fas fa-credit-card"></i></div>
                <div class="step-text" id="pago-text">Pago en verificación</div>
            </div>
            <div class="step" id="step-preparacion">
                <div class="step-icon"><i class="fas fa-mug-hot"></i></div>
                <div class="step-text">Preparando tu pedido</div>
            </div>
            <div class="step" id="step-entrega">
                <div class="step-icon"><i class="fas fa-hand-holding-heart"></i></div>
                <div class="step-text">Listo para retirar / En camino</div>
            </div>
            <div class="step" id="step-finalizado">
                <div class="step-icon"><i class="fas fa-flag-checkered"></i></div>
                <div class="step-text">Entregado</div>
            </div>
        </div>

        <div id="action-area">
            <!-- Dinámico: Botón reintentar o Volver -->
        </div>

        <p style="font-size: 13px; color: #999; margin-top: 40px;">
            Podés cerrar esta página. Te avisaremos por WhatsApp ante cualquier cambio.
        </p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const mpStatus = urlParams.get('status');

        if (!orderId) {
            window.location.href = 'tienda.html';
        } else {
            // Fire GA4 purchase event — read cart before clearing it
            try {
                const savedCart = JSON.parse(localStorage.getItem('corcega_cart') || '[]');
                if (savedCart.length > 0 && typeof gtag === 'function') {
                    const total = savedCart.reduce((s, i) => s + (i.precio * i.qty), 0);
                    gtag('event', 'purchase', {
                        transaction_id: orderId,
                        value: total,
                        currency: 'ARS',
                        items: savedCart.map(i => ({
                            item_id: i.id,
                            item_name: i.nombre,
                            item_variant: i.variantLabel || undefined,
                            price: i.precio,
                            quantity: i.qty
                        }))
                    });
                }
            } catch(e) { console.warn('GA4 purchase error:', e); }

            // Ya aterrizamos en seguimiento, limpiamos el carrito local
            localStorage.removeItem('corcega_cart');
            
            // Listener de estado de la orden (público via OrderID)
            const id = urlParams.get('orderId');
            if (id) {
                document.getElementById('order-id-badge').innerText = 'ORDEN #' + id.substring(0,8).toUpperCase();
                initStatusListener(id);
            } else {
                window.location.href = 'tienda.html';
            }

            // Opcional: Si el usuario está logueado, podemos mostrar un saludo o link a su cuenta
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log("Usuario logueado:", user.email);
                    // Podríamos mostrar un botón de "Volver a mi cuenta"
                }
            });
        }

        async function initStatusListener(id) {
            // 1. Primer intento: Obtener data pública (Seguro y Funciona sin login)
            const publicOrder = await fetchPublicOrder(id);
            if (publicOrder) {
                updateSteppers(publicOrder);
            }

            // 2. Segundo intento: Escucha real-time (Solo si tiene permisos/login)
            const orderRef = doc(db, "ordenes", id);
            onSnapshot(orderRef, (docSnap) => {
                if (docSnap.exists()) {
                    const order = docSnap.data();
                    updateSteppers(order);
                }
            }, (error) => {
                console.warn("Escucha real-time deshabilitada (vía pública):", error.message);
                // Si la escucha real-time falla, podemos re-consultar la función cada 2 min
                setTimeout(() => fetchPublicOrder(id).then(o => o && updateSteppers(o)), 120000);
            });
        }

        async function fetchPublicOrder(orderId) {
            try {
                const response = await fetch('https://getpublicorder-ioo4dzpz2a-uc.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId })
                });
                if (!response.ok) return null;
                return await response.json();
            } catch (err) {
                console.error("Error fetching public order:", err);
                return null;
            }
        }

        function updateSteppers(order) {
            if (!order) return;
            
            // Actualizar ID Badge
            const orderNum = order.orderNumber || order.id?.substring(0,8) || orderId?.substring(0,8);
            document.getElementById('order-id-badge').innerText = 'ORDEN #' + orderNum;
            
            // Ocultar Loader y Mostrar Stepper
            document.getElementById('order-loader').style.display = 'none';
            document.getElementById('order-stepper').style.display = 'flex';

            const stepPago = document.getElementById('step-pago');
            const pagoText = document.getElementById('pago-text');
            const actionArea = document.getElementById('action-area');
            const mainTitle = document.getElementById('main-title');

            // Definición de botones reutilizables
            const btnHome = `<button onclick="window.location.href='tienda.html'" class="btn-primary-corcega" style="margin-top:20px;">Seguir comprando</button>`;
            const btnOrders = `<button onclick="window.location.href='tienda-cuenta.html'" class="btn-outline-corcega">Ver mis pedidos</button>`;
            const waMsg = encodeURIComponent(`Hola Córcega! Realicé el pedido #${orderId.substring(0,6)}. Te adjunto el comprobante.`);
            const btnWA = `
                <a href="https://wa.me/5491136053892?text=${waMsg}" target="_blank" class="btn-wa">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:20px;"> Enviar Comprobante
                </a>`;
            const btnMP = `<button id="btn-pay-mp" onclick="retryPayment('${orderId}')" class="btn-retry">Pagar con MercadoPago</button>`;

            // Reset
            stepPago.classList.remove('active', 'error');
            document.getElementById('step-preparacion').classList.remove('active');
            document.getElementById('step-entrega').classList.remove('active');
            document.getElementById('step-finalizado').classList.remove('active');

            const estados = ['pagado', 'en_preparacion', 'listo', 'finalizado'];
            const actualIdx = estados.indexOf(order.estado);

            // 1. Lógica de Pago (Paso 2)
            if (order.estado === 'pagado' || actualIdx >= 1) {
                stepPago.classList.add('active');
                pagoText.innerText = "Pago confirmado ✨";
                mainTitle.innerText = "¡Todo en marcha!";
                actionArea.innerHTML = btnHome + btnOrders;
            } else if (order.estado === 'rechazado') {
                stepPago.classList.add('error');
                pagoText.innerText = "Pago rechazado ❌";
                mainTitle.innerText = "¡Ups! Algo falló con el pago";
                actionArea.innerHTML = btnHome + btnOrders;
            } else if (order.metodoPago === 'transferencia') {
                stepPago.classList.remove('active');
                pagoText.innerText = "Validación de pago 🕒";
                mainTitle.innerText = "¡Pedido recibido!";
                actionArea.innerHTML = `
                    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                        <p style="font-size:13px; color:#666; margin-bottom:5px;">Por favor envíanos el comprobante para procesar tu pedido:</p>
                        ${btnWA}
                        <p style="font-size:11px; color:#999; margin-top:10px; border-top: 1px dashed #eee; padding-top:10px;">¿Preferís pagar con tarjeta?</p>
                        <div style="transform:scale(0.9);">${btnMP}</div>
                        ${btnHome}
                        ${btnOrders}
                    </div>
                `;
            } else {
                // Pago pendiente Mercado Pago o Rechazado
                stepPago.classList.remove('active');
                if (order.estado === 'rechazado') stepPago.classList.add('error');
                
                pagoText.innerText = order.estado === 'rechazado' ? "Pago rechazado ❌" : "Pago pendiente";
                mainTitle.innerText = order.estado === 'rechazado' ? "¡Ups! Algo falló" : "¡Pedido recibido!";
                
                actionArea.innerHTML = `
                    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                        ${btnMP}
                        <p style="font-size:11px; color:#999; margin-top:10px; border-top: 1px dashed #eee; padding-top:10px;">¿Preferís pagar por transferencia?</p>
                        <div style="transform:scale(0.9);">${btnWA}</div>
                        ${btnHome}
                        ${btnOrders}
                    </div>
                `;
            }

            // 2. Lógica de producción... (Pintar según estado de Firestore)
            if (actualIdx >= 1) document.getElementById('step-preparacion').classList.add('active');
            if (actualIdx >= 2) document.getElementById('step-entrega').classList.add('active');
            if (actualIdx >= 3) document.getElementById('step-finalizado').classList.add('active');
        }

        window.retryPayment = async (id) => {
            const btn = document.getElementById('btn-pay-mp');
            const originalText = btn.innerText;
            btn.innerText = "Redirigiendo... ⏳";
            btn.disabled = true;

            try {
                const successUrl = window.location.origin + "/success.html?orderId=" + id;
                const response = await fetch('https://crearpreferenciamp-ioo4dzpz2a-uc.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: id, successUrl })
                });
                
                const data = await response.json();
                if (data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    alert("No pudimos generar el link de pago. Intentá más tarde.");
                }
            } catch (err) {
                console.error(err);
                alert("Hubo un error al conectar con Mercado Pago.");
            } finally {
                btn.innerText = "PAGAR CON MERCADO PAGO";
                btn.disabled = false;
            }
        };
    </script>
    <footer id="main-footer"></footer>
    <script type="module" src="js/tienda/footer-component.js?v=1.2"></script>
</body>
</html>
