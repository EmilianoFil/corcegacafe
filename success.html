<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de tu Pedido - Córcega Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tienda/tienda.css?v=1.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fdfcf7; }
        .success-card {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        
        /* Stepper Styles */
        .stepper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 30px;
            width: 2px;
            height: 20px;
            background: #eee;
        }
        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            z-index: 1;
        }
        .step.active .step-icon { background: #4BB543; }
        .step.error .step-icon { background: #d86634; }
        .step-text { font-size: 15px; font-weight: 500; color: #aaa; }
        .step.active .step-text { color: var(--panel-oscuro); font-weight: 700; }
        .step.error .step-text { color: #d86634; }

        .btn-retry {
            background: #d86634;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .order-badge {
            background: #f8f9fa;
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div id="status-header">
            <h1 id="main-title" style="font-family: 'Playfair Display', serif; margin-bottom: 5px;">Procesando...</h1>
            <div id="order-id-badge" class="order-badge">Buscando pedido...</div>
        </div>

        <div class="stepper" id="order-stepper">
            <div class="step active" id="step-recibido">
                <div class="step-icon"><i class="fas fa-check"></i></div>
                <div class="step-text">Pedido recibido</div>
            </div>
            <div class="step" id="step-pago">
                <div class="step-icon"><i class="fas fa-credit-card"></i></div>
                <div class="step-text" id="pago-text">Pago en verificación</div>
            </div>
            <div class="step" id="step-preparacion">
                <div class="step-icon"><i class="fas fa-boxes-packing"></i></div>
                <div class="step-text">Preparando tu pedido</div>
            </div>
            <div class="step" id="step-entrega">
                <div class="step-icon"><i class="fas fa-hand-holding-heart"></i></div>
                <div class="step-text">Listo para retirar / En camino</div>
            </div>
            <div class="step" id="step-finalizado">
                <div class="step-icon"><i class="fas fa-flag-checkered"></i></div>
                <div class="step-text">Entregado</div>
            </div>
        </div>

        <div id="action-area">
            <!-- Dinámico: Botón reintentar o Volver -->
        </div>

        <p style="font-size: 13px; color: #999; margin-top: 40px;">
            Podés cerrar esta página. Te avisaremos por WhatsApp ante cualquier cambio.
        </p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const mpStatus = urlParams.get('status');

        if (!orderId) {
            window.location.href = 'tienda.html';
        } else {
            document.getElementById('order-id-badge').innerText = 'ORDEN #' + orderId.substring(0,8).toUpperCase();
            initStatusListener(orderId);
        }

        function initStatusListener(id) {
            const orderRef = doc(db, "ordenes", id);
            
            // Escuchar cambios en tiempo real
            onSnapshot(orderRef, (docSnap) => {
                if (docSnap.exists()) {
                    const order = docSnap.data();
                    updateSteppers(order);
                }
            });
        }

        function updateSteppers(order) {
            const stepPago = document.getElementById('step-pago');
            const pagoText = document.getElementById('pago-text');
            const actionArea = document.getElementById('action-area');
            const mainTitle = document.getElementById('main-title');

            // Reset
            stepPago.classList.remove('active', 'error');
            document.getElementById('step-preparacion').classList.remove('active');
            document.getElementById('step-entrega').classList.remove('active');
            document.getElementById('step-finalizado').classList.remove('active');

            // 1. Lógica de Pago
            if (order.estado === 'pagado' || order.metodoPago === 'transferencia') {
                stepPago.classList.add('active');
                pagoText.innerText = "Pago confirmado ✨";
                mainTitle.innerText = "¡Todo en marcha!";
                actionArea.innerHTML = '<button onclick="window.location.href=\'tienda.html\'" class="btn-checkout" style="background:#d86634; color:white; border:none; width:100%; padding:18px; border-radius:12px; font-weight:700; cursor:pointer;">VOLVER A LA TIENDA</button>';
            } else if (order.metodoPago === 'transferencia' && order.estado !== 'pagado') {
                stepPago.classList.remove('active');
                pagoText.innerText = "Esperando transferencia";
                mainTitle.innerText = "¡Pedido recibido!";
                const waMsg = encodeURIComponent(`Hola Córcega! Realicé el pedido #${id.substring(0,6)}. Te adjunto el comprobante de transferencia.`);
                actionArea.innerHTML = `
                    <div style="margin-top:20px;">
                        <p style="font-size:13px; margin-bottom:15px; color:#666; line-height:1.4;">Para procesar tu pedido, por favor envíanos el comprobante por WhatsApp.</p>
                        <a href="https://wa.me/5491122334455?text=${waMsg}" target="_blank" class="btn-retry" style="background:#25d366; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:20px; height:20px;">
                            ENVIAR COMPROBANTE
                        </a>
                        <p style="font-size:11px; margin-top:15px; color:#999;">¿Deseas cambiar el método de pago?</p>
                        <button id="btn-pay-mp" onclick="retryPayment('${id}')" class="btn-retry" style="background:#009ee3; font-size:12px; padding:10px;">PAGAR CON MERCADOPAGO</button>
                    </div>
                `;
            } else if (order.estado === 'pendiente_pago' || order.estado === 'rechazado') {
                stepPago.classList.remove('active');
                pagoText.innerText = "Pago pendiente";
                mainTitle.innerText = "¡Pedido recibido!";
                actionArea.innerHTML = `
                    <div style="margin-top:20px;">
                        <button id="btn-pay-mp" onclick="retryPayment('${id}')" class="btn-retry" style="background:#009ee3; margin-bottom:10px;">PAGAR CON MERCADOPAGO</button>
                        <button onclick="window.location.href='tienda.html'" class="btn-checkout" style="background:#eee; color:#666; width:100%; border:none; padding:15px; border-radius:12px; font-weight:700; cursor:pointer;">VOLVER A LA TIENDA</button>
                    </div>
                `;
            }

            // 2. Lógica de producción... (Pintar según estado de Firestore)
            const estados = ['pagado', 'preparando', 'listo', 'finalizado'];
            const actualIdx = estados.indexOf(order.estado);

            if (actualIdx >= 1) document.getElementById('step-preparacion').classList.add('active');
            if (actualIdx >= 2) document.getElementById('step-entrega').classList.add('active');
            if (actualIdx >= 3) document.getElementById('step-finalizado').classList.add('active');
        }

        window.retryPayment = async (id) => {
            const btn = document.getElementById('btn-pay-mp');
            btn.innerText = "Redirigiendo... ⏳";
            btn.disabled = true;

            try {
                const successUrl = window.location.origin + "/success.html?orderId=" + id;
                const response = await fetch('https://crearpreferenciamp-ioo4dzpz2a-uc.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: id, successUrl })
                });
                
                const data = await response.json();
                if (data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    alert("No pudimos generar el link de pago. Intentá más tarde.");
                }
            } catch (err) {
                console.error(err);
                alert("Hubo un error al conectar con Mercado Pago.");
            } finally {
                btn.innerText = "PAGAR CON MERCADO PAGO";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
